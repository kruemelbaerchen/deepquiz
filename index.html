  @media (max-width:430px){ body{padding:0;} .phone{width:100%; height:100vh; height:100dvh; max-height:none; border-radius:0; box-shadow:none;} }

async function doSignup(){

// ===================== DUEL =====================
async function openDuel(id){
  spin();
  const {data:duel}=await sb.from('duels').select('*').eq('id',id).maybeSingle();
  if(!duel){toast('Duel not found');return goHome();}
  D=duel;myRole=(D.a===me.id)?'a':'b';oppId=myRole==='a'?D.b:D.a;oppName=myRole==='a'?D.b_name:D.a_name;
  let {data:rounds}=await sb.from('rounds').select('*').eq('duel_id',id).order('round_no');
  RND=rounds||[];
  if(D.status==='finished')return duelResult();
  let cur=RND[RND.length-1];
  // if current round fully resolved but duel still active -> make the next round
  if(cur&&cur.a_correct!=null&&cur.b_correct!=null){
    const nxt=await createNextRound();
    if(!nxt){await finishByWins();return duelResult();}
    RND.push(nxt);cur=nxt;
  }
  if(!cur){toast('No round');return goHome();}
  const myG=(myRole==='a'?cur.a_guesses:cur.b_guesses)||[];
  if(myG.length>=ROUND_Q)return duelWaiting(cur);
  oppAnswers=await loadAnswers(oppId,cur.question_ids);
  DG={round:cur,idx:myG.length,guesses:myG.slice()};
  dgRender();
}
async function loadAnswers(uid,qids){
  const {data}=await sb.from('self_answers').select('question_id,answer').eq('user_id',uid).in('question_id',qids);
  const m={};(data||[]).forEach(a=>m[a.question_id]=a.answer);return m;
}
function duelHeader(){
  const myW=myRole==='a'?D.wins_a:D.wins_b, opW=myRole==='a'?D.wins_b:D.wins_a;
  const pips=[];for(let i=0;i<WIN_TARGET;i++)pips.push(`<span class="pip ${i<myW?'me':''}"></span>`);
  const opips=[];for(let i=0;i<WIN_TARGET;i++)opips.push(`<span class="pip ${i<opW?'op':''}"></span>`);
  return `<div class="wins"><span class="me">You ${myW}</span><span class="dash">vs</span><span class="op">${opW} ${esc(oppName)}</span></div>
    <div class="pips">${pips.join('')}<span style="width:8px"></span>${opips.join('')}</div>`;
}
function dgRender(){
  const r=DG.round,q=QBYID[r.question_ids[DG.idx]],meta=lvlMeta(q.lvl);
  $top.textContent=`Round ${r.round_no} · ${DG.idx+1}/${ROUND_Q}`;
  screen.innerHTML=`${duelHeader()}
    <div class="qhead" style="margin-top:8px"><span class="pill l${q.lvl}">${meta.emoji} ${meta.name}</span></div>
    <div class="who">What did <b>${esc(oppName)}</b> answer?</div><div class="qtext">${esc(q.label)}</div>
    <div id="body">${inputHTML(q,'dg')}</div><div id="reveal-slot"></div>`;
}
async function dgCommit(v){
  const r=DG.round,q=QBYID[r.question_ids[DG.idx]],actual=oppAnswers[r.question_ids[DG.idx]];
  DG.guesses[DG.idx]=v;
  // commit immediately (lock) BEFORE revealing
  await sb.from('rounds').update({[myRole+'_guesses']:DG.guesses}).eq('id',r.id);
  // reveal
  const verdict=q.fmt==='slider'?(Math.abs(v-actual)<=15?'correct':Math.abs(v-actual)<=30?'close':'wrong'):(v===actual?'correct':'wrong');
  if(q.fmt!=='slider'){
    document.querySelectorAll('.opt').forEach(o=>{o.style.pointerEvents='none';const oi=+o.dataset.i;
      if(oi===actual){o.classList.add('correct');o.innerHTML+=`<span class="tag">✓ ${esc(oppName)}</span>`;}
      else if(oi===v){o.classList.add('wrong');o.innerHTML+=`<span class="tag">✗ you</span>`;}});
  } else {
    document.getElementById('sld').disabled=true;
    document.getElementById('body').insertAdjacentHTML('beforeend',`<div class="marker"><div class="dot you" style="left:${v}%">You</div><div class="dot mia" style="left:${actual}%">${esc(oppName)}</div></div>`);
  }
  const vC=verdict==='correct'?'v-correct':verdict==='close'?'v-close':'v-wrong';
  const vT=verdict==='correct'?'Nailed it! 🎯':verdict==='close'?'So close 👀':'Missed 🙈';
  const last=DG.idx===ROUND_Q-1;
  document.getElementById('reveal-slot').innerHTML=`<div class="reveal"><div class="verdict ${vC}">${vT}</div>
    <div class="answer"><span class="you">You:</span> <b>${esc(answerText(q,v))}</b> &nbsp;·&nbsp; <span class="mia">${esc(oppName)}:</span> <b>${esc(answerText(q,actual))}</b></div></div>
    <div class="footer-btn"><button class="btn" onclick="dgNext()">${last?'Finish round →':'Next →'}</button></div>`;
  screen.scrollTo({top:screen.scrollHeight,behavior:'smooth'});
}
function dgNext(){if(DG.idx<ROUND_Q-1){DG.idx++;dgRender();}else dgFinishSide();}
async function dgFinishSide(){
  spin();
  const r=DG.round;
  let correct=0;r.question_ids.forEach((qid,i)=>{correct+=scoreOne(QBYID[qid],DG.guesses[i],oppAnswers[qid]);});
  await sb.from('rounds').update({[myRole+'_correct']:correct}).eq('id',r.id);
  // reload round to see opponent
  const {data:fresh}=await sb.from('rounds').select('*').eq('id',r.id).maybeSingle();
  const oppCorrect=myRole==='a'?fresh.b_correct:fresh.a_correct;
  if(oppCorrect!=null){await resolveRound(fresh,correct,oppCorrect);}
  else duelWaiting(fresh,correct);
}
async function resolveRound(r,myCorrect,oppCorrect){
  const aWin=r.a_correct>r.b_correct, bWin=r.b_correct>r.a_correct;
  const winnerId=aWin?D.a:bWin?D.b:null;
  await sb.from('rounds').update({winner:winnerId}).eq('id',r.id);
  // recompute wins from ALL resolved rounds -> idempotent (safe even if resolved twice / concurrently)
  const {data:allR}=await sb.from('rounds').select('winner').eq('duel_id',D.id);
  let wa=0,wb=0;(allR||[]).forEach(x=>{ if(x.winner===D.a)wa++; else if(x.winner===D.b)wb++; });
  let patch={wins_a:wa,wins_b:wb,updated_at:new Date().toISOString()};
  if(wa>=WIN_TARGET||wb>=WIN_TARGET){patch.status='finished';patch.winner=wa>wb?D.a:D.b;}
  await sb.from('duels').update(patch).eq('id',D.id);
  D={...D,...patch};
  roundResult(r,myCorrect,oppCorrect,winnerId);
}
function roundResult(r,myCorrect,oppCorrect,winnerId){
  const iWon=winnerId===me.id, tie=winnerId==null;
  const head=tie?'Round tied 🤝':iWon?'You win the round! 🎉':`${esc(oppName)} wins the round`;
  $top.textContent=`Round ${r.round_no}`;
  const finished=D.status==='finished';
  screen.innerHTML=`<div class="mt2 center"><div class="big-emoji">${tie?'🤝':iWon?'🎉':'😬'}</div><h2>${head}</h2>
    <p class="sub mt">This round: you ${myCorrect} · ${esc(oppName)} ${oppCorrect}</p></div>
    ${duelHeader()}
    <div class="footer-btn">${finished?`<button class="btn" onclick="duelResult()">See final result →</button>`:`<button class="btn" onclick="openDuel('${D.id}')">Next round →</button>`}</div>`;
}
function duelWaiting(r,myCorrect){
  $top.textContent=`Round ${r.round_no}`;
  screen.innerHTML=`<div class="mt2 center"><div class="big-emoji">⏳</div><h2>Your guesses are in!</h2>
    <p class="sub mt">Now it's <b style="color:var(--text)">${esc(oppName)}</b>'s turn to guess you for round ${r.round_no}. Check back when they've played.</p></div>
    ${duelHeader()}
    <div class="footer-btn"><button class="btn" onclick="goHome()">Back to my duels →</button></div>`;
}
async function createNextRound(){
  const used=new Set(RND.flatMap(r=>r.question_ids));
  const {data:oppAns}=await sb.from('self_answers').select('question_id').eq('user_id',oppId);
  const oppSet=new Set((oppAns||[]).map(a=>a.question_id));
  const fresh=[...me.answered].filter(x=>oppSet.has(x)&&!used.has(x));
  if(fresh.length<ROUND_Q)return null;
  const roundNo=RND.length+1;
  const {data:exist}=await sb.from('rounds').select('*').eq('duel_id',D.id).eq('round_no',roundNo).maybeSingle();
  if(exist)return exist;
  const picked=shuffle(fresh).slice(0,ROUND_Q).sort((x,y)=>QBYID[x].lvl-QBYID[y].lvl);
  const {data:nr,error}=await sb.from('rounds').insert({duel_id:D.id,round_no:roundNo,question_ids:picked}).select().single();
  if(error){ // a concurrent insert may have won the race -> use the existing round
    const {data:ex2}=await sb.from('rounds').select('*').eq('duel_id',D.id).eq('round_no',roundNo).maybeSingle();
    return ex2||null;
  }
  return nr;
}
async function finishByWins(){
  const patch={status:'finished',winner:D.wins_a>D.wins_b?D.a:(D.wins_b>D.wins_a?D.b:null),updated_at:new Date().toISOString()};
  await sb.from('duels').update(patch).eq('id',D.id);D={...D,...patch};
}
// ===================== DUEL RESULT + both-direction overview =====================
async function duelResult(){
  spin();
  const {data:rounds}=await sb.from('rounds').select('*').eq('duel_id',D.id).order('round_no');
  RND=rounds||[];
  const myW=myRole==='a'?D.wins_a:D.wins_b, opW=myRole==='a'?D.wins_b:D.wins_a;
  const iWon=D.winner===me.id, tie=!D.winner;
  // head-to-head across all finished duels with this opponent
  const {data:all}=await sb.from('duels').select('winner,status,a,b').or(`and(a.eq.${me.id},b.eq.${oppId}),and(a.eq.${oppId},b.eq.${me.id})`).eq('status','finished');
  let h2hMe=0,h2hOp=0;(all||[]).forEach(d=>{if(d.winner===me.id)h2hMe++;else if(d.winner===oppId)h2hOp++;});
  // both-direction per-question overview
  const myAns=await loadAnswers(me.id,[...new Set(RND.flatMap(r=>r.question_ids))]);
  const opAns=await loadAnswers(oppId,[...new Set(RND.flatMap(r=>r.question_ids))]);
  let ov='';
  RND.forEach(r=>{
    if(r.a_correct==null||r.b_correct==null)return;
    r.question_ids.forEach((qid,i)=>{
      const q=QBYID[qid];
      const myGuess=(myRole==='a'?r.a_guesses:r.b_guesses)||[];
      const opGuess=(myRole==='a'?r.b_guesses:r.a_guesses)||[];
      const myG=myGuess[i], opG=opGuess[i];
      const ic1=scoreOne(q,myG,opAns[qid])>=1?'🟢':scoreOne(q,myG,opAns[qid])>0?'🟡':'🔴';
      const ic2=scoreOne(q,opG,myAns[qid])>=1?'🟢':scoreOne(q,opG,myAns[qid])>0?'🟡':'🔴';
      ov+=`<div class="ovrow"><div class="q">${esc(q.label)}</div>
        <div class="line"><span>${ic1} You guessed <b>${esc(answerText(q,myG))}</b></span><span>${esc(oppName)}: <b>${esc(answerText(q,opAns[qid]))}</b></span></div>
        <div class="line" style="margin-top:4px"><span>${ic2} ${esc(oppName)} guessed <b>${esc(answerText(q,opG))}</b></span><span>You: <b>${esc(answerText(q,myAns[qid]))}</b></span></div></div>`;
    });
  });
  $top.textContent='Result';
  screen.innerHTML=`<div class="mt center"><div class="big-emoji">${tie?'🤝':iWon?'🏆':'👑'}</div>
    <h2>${tie?'Draw!':iWon?'You win!':esc(oppName)+' wins'}</h2>
    <p class="sub">${myW}–${opW} vs ${esc(oppName)} · Head-to-head: ${h2hMe}–${h2hOp}</p></div>
    <div class="section-t">Question by question</div>${ov||'<p class="sub">No completed rounds.</p>'}
    <div class="footer-btn stack">
      <button class="btn" onclick="rematch()">Rematch ${esc(oppName)} →</button>
      <button class="btn ghost" onclick="goHome()">← My duels</button></div>`;
}
async function rematch(){const opp={id:oppId,username:oppName};busy(null);await createDuelWith(opp);}

// ===================== LEADERBOARD (who knows me best) =====================
async function leaderboard(){
  topRight();spin();
  const {data:duels}=await sb.from('duels').select('id,a,b,a_name,b_name').or(`a.eq.${me.id},b.eq.${me.id}`);
  const ids=(duels||[]).map(d=>d.id);
  const score={}; // opponentName -> {correct, total}
  if(ids.length){
    const {data:rs}=await sb.from('rounds').select('*').in('duel_id',ids);
    const dById=Object.fromEntries((duels||[]).map(d=>[d.id,d]));
    (rs||[]).forEach(r=>{
      const d=dById[r.duel_id];if(!d)return;
      const meA=d.a===me.id; const opName=meA?d.b_name:d.a_name;
      // opponent guessing ME = (meA? b_guesses : a_guesses) scored vs MY answers
      const opGuess=meA?r.b_guesses:r.a_guesses; if(!opGuess||opGuess.length<ROUND_Q)return;
      score[opName]=score[opName]||{c:0,t:0};
      r.question_ids.forEach((qid,i)=>{ /* scored later needs my answers */ score[opName]._q=(score[opName]._q||[]); score[opName]._q.push([qid,opGuess[i]]); });
    });
  }
  // score against my answers
  const myAllQ=[...new Set(Object.values(score).flatMap(s=>(s._q||[]).map(x=>x[0])))];
  const myAns=myAllQ.length?await loadAnswers(me.id,myAllQ):{};
  const rows=Object.entries(score).map(([n,s])=>{
    let c=0,t=0;(s._q||[]).forEach(([qid,g])=>{t++;c+=scoreOne(QBYID[qid],g,myAns[qid]);});
    return [n,t?Math.round(c/t*100):0,t];
  }).filter(r=>r[2]>0).sort((a,b)=>b[1]-a[1]);
  const body=rows.length?rows.map(([n,p],i)=>`<div class="lb-row ${i===0?'top':''}"><span class="lb-rank">${i===0?'👑':'#'+(i+1)}</span><span class="lb-name">${esc(n)}</span><span class="lb-pct">${p}%</span></div>`).join(''):'<p class="sub">No one has guessed you yet. Challenge a friend!</p>';
  screen.innerHTML=`<div class="mt center"><h2>Who knows me best</h2><p class="sub">Ranked by how well friends guess your answers.</p></div>
    <div class="mt">${body}</div><div class="footer-btn"><button class="btn ghost" onclick="goHome()">← Back</button></div>`;
}

// ===================== TOP-UP (answer more) =====================
function topUp(){
  const missing=[...SPICY_TOPUP, ...Q.filter(q=>q.lvl<4).map(q=>q.id)].filter(id=>!me.answered.has(id));
  if(!missing.length){toast("You've answered everything! 🎉");return;}
  OB={ids:missing.slice(0,8),idx:0};obRender();
}

// ===================== shared input =====================
function inputHTML(q,h){
  if(q.fmt==='binary')return `<div class="binary">${q.options.map((o,i)=>`<button class="opt" data-i="${i}" onclick="onPick('${h}',${i})">${esc(o)}</button>`).join('')}</div>`;
  if(q.fmt==='mc')return `<div class="options">${q.options.map((o,i)=>`<button class="opt" data-i="${i}" onclick="onPick('${h}',${i})">${esc(o)}</button>`).join('')}</div>`;
  return `<div class="slider-wrap"><div class="slider-labels"><span>${esc(q.poles[0])}</span><span>${esc(q.poles[1])}</span></div>
    <input type="range" min="0" max="100" value="50" id="sld"></div>
    <button class="btn mt" onclick="onSlider('${h}')">${h==='dg'||h==='gt'?'Lock in guess':'Next →'}</button>`;
}
function onPick(h,i){ if(h==='ob')obSave(i); else if(h==='gt')gtAnswer(i); else if(h==='dg')dgCommit(i); }
function onSlider(h){ const v=+document.getElementById('sld').value; if(h==='ob')obSave(v); else if(h==='gt')gtAnswer(v); else if(h==='dg')dgCommit(v); }

init();
</script>
