// ---------- DUEL ----------
// Strict turn order per round: starter answers self → responder answers self + guesses
// starter (immediate feedback) → starter guesses responder (immediate feedback) → resolve.
// Starter alternates each round so both players take turns going first.
function starterRole(roundNo){return roundNo%2===1?'a':'b';}
function roundStage(r){
  const S=starterRole(r.round_no), T=S==='a'?'b':'a';
  const full=x=>x!=null&&x.length===r.question_ids.length;
  if(!full(r[S+'_self']))return {stage:'s_self',turn:S,S,T};
  if(!full(r[T+'_self'])||!full(r[T+'_guesses']))return {stage:'t_play',turn:T,S,T};
  if(!full(r[S+'_guesses']))return {stage:'s_guess',turn:S,S,T};
  return {stage:'done',turn:null,S,T};
}
function fbHTML(q,guessV,actualV,oppN){
  const s=scoreOne(q,guessV,actualV),ok=s>=1,part=s>0&&s<1;
  const cls=ok?'ok':part?'part':'no',ic=ok?'✅':part?'😬':'❌',verdict=ok?'Spot on!':part?'So close!':'Not quite';
  return `<div class="modebar guess">🎯 GUESS ${esc((oppN||'').toUpperCase())}</div>
    <div class="qtext" style="font-size:19px; margin-bottom:16px">${esc(q.label)}</div>
    <div class="fbig">${ic}</div><div class="fbverdict ${cls}">${verdict}</div>
    <div class="fbrow them"><span class="lbl">${esc(oppN)} answered</span><b>${esc(answerText(q,actualV))}</b></div>
    <div class="fbrow"><span class="lbl">You guessed</span><b>${esc(answerText(q,guessV))}</b></div>`;
}
function duelHeader(){
  const myW=myRole==='a'?D.wins_a:D.wins_b, opW=myRole==='a'?D.wins_b:D.wins_a;
  let p='',o='';for(let i=0;i<WIN_TARGET;i++){p+=`<span class="pip ${i<myW?'me':''}"></span>`;o+=`<span class="pip ${i<opW?'op':''}"></span>`;}
  return `<div class="wins"><span class="me">You ${myW}</span><span class="dash">vs</span><span class="op">${opW} ${esc(oppName)}</span></div><div class="pips">${p}<span style="width:8px"></span>${o}</div>`;
}
async function openDuel(id){
  spin();
  const {data:duel}=await sb.from('duels').select('*').eq('id',id).maybeSingle();
  if(!duel){toast('Duel not found');return goHome();}
  D=duel;myRole=D.a===me.id?'a':'b';oppId=myRole==='a'?D.b:D.a;oppName=myRole==='a'?D.b_name:D.a_name;
  let {data:rounds}=await sb.from('rounds').select('*').eq('duel_id',id).order('round_no');
  RND=rounds||[];
  if(D.status!=='finished'&&(D.wins_a>=WIN_TARGET||D.wins_b>=WIN_TARGET)){await finishByWins();return duelResult();}
  if(D.status==='finished')return duelResult();
  let cur=RND[RND.length-1];
  if(cur&&roundStage(cur).stage==='done'){
    let justResolved=false;
    if(cur.a_correct==null){await computeResolve(cur);justResolved=true;}
    if(D.status==='finished')return duelResult();
    if(justResolved){playRound=cur;return roundResult(cur);}
    const nxt=await createNextRound();if(!nxt){await finishByWins();return duelResult();}
    RND.push(nxt);cur=nxt;
  }
  if(!cur){toast('No round');return goHome();}
  playRound=cur;matchScreen(cur);
}
function matchScreen(cur){
  $top.textContent='Duel';
  const resolved=RND.filter(r=>r.a_correct!=null);
  const rows=resolved.map(r=>{const myC=myRole==='a'?r.a_correct:r.b_correct,opC=myRole==='a'?r.b_correct:r.a_correct;
    const ic=r.winner===me.id?'🟢':r.winner?'🔴':'🤝';
    return `<div class="duel-row" onclick="viewRound(${r.round_no})"><div class="meta"><div class="t">Round ${r.round_no} ${ic}</div><div class="s">You ${myC} – ${opC} ${esc(oppName)}</div></div><span class="badge wait">View ›</span></div>`;}).join('');
  const st=roundStage(cur), myTurn=st.turn===myRole;
  let action;
  if(myTurn){
    const label=st.stage==='s_guess'?`Guess ${esc(oppName)}`:st.stage==='s_self'?`Start round ${cur.round_no}`:`Play round ${cur.round_no}`;
    const hint=st.stage==='s_self'?'Answer 3 questions about yourself — then it’s their turn.':st.stage==='s_guess'?`${esc(oppName)} has played. Guess their answers to win the round.`:`Answer about yourself and guess ${esc(oppName)} — with instant feedback.`;
    action=`<p class="hint" style="margin-bottom:10px">${hint}</p><button class="btn" onclick="dgStart()">${label} →</button>`;
  } else {
    action=`<div class="center sub" style="margin:14px 0">⏳ Waiting for <b style="color:var(--text)">${esc(oppName)}</b> to take their turn on round ${cur.round_no}.</div><button class="btn ghost" onclick="goHome()">← My duels</button>`;
  }
  screen.innerHTML=`<div class="mt"><h2>You vs ${esc(oppName)}</h2></div>${duelHeader()}
    ${resolved.length?`<div class="section-t">Rounds so far</div>${rows}`:''}
    <div class="footer-btn stack">${action}</div>`;
}
function viewRound(n){const r=RND.find(x=>x.round_no===n);if(!r)return;
  const myC=myRole==='a'?r.a_correct:r.b_correct,opC=myRole==='a'?r.b_correct:r.a_correct;
  const iWon=r.winner===me.id,tie=!r.winner;$top.textContent=`Round ${n}`;
  screen.innerHTML=`<div class="center mt"><h2>Round ${n} — ${tie?'tied':iWon?'you won':esc(oppName)+' won'}</h2>
    <p class="sub">You ${myC} · ${esc(oppName)} ${opC}</p></div>
    <div class="section-t">Answers</div>${roundRevealHtml(r)}
    <div class="footer-btn"><button class="btn ghost" onclick="openDuel('${D.id}')">← Back to duel</button></div>`;}
function dgStart(){
  const r=playRound, st=roundStage(r), oppR=myRole==='a'?'b':'a';
  const mySelf=r[myRole+'_self'], hasSelf=mySelf!=null&&mySelf.length===r.question_ids.length;
  let mode;
  if(st.stage==='s_self')mode='self_only';
  else if(st.stage==='s_guess')mode='guess_only';
  else mode=hasSelf?'guess_only':'interleaved'; // t_play
  const tgt=r[oppR+'_self'];
  DG={round:r,idx:0,mode,phase:mode==='guess_only'?'guess':'self',selfA:hasSelf?mySelf.slice():[],guesses:[],targetSelf:tgt?tgt.slice():[],fb:null};
  dgRender();
}
function dgRender(){
  const r=DG.round,q=QBYID[r.question_ids[DG.idx]],meta=lvlMeta(q.lvl);
  $top.textContent=`Round ${r.round_no} · ${DG.idx+1}/${ROUND_Q}`;
  if(DG.fb){
    screen.innerHTML=`${duelHeader()}${fbHTML(q,DG.fb.guess,DG.fb.actual,oppName)}
      <div class="footer-btn"><button class="btn" onclick="dgFbNext()">${DG.idx<ROUND_Q-1?'Next question →':'See round result →'}</button></div>`;
    return;
  }
  const self=DG.phase==='self';
  const bar=self?`<div class="modebar self">✍️ ABOUT YOU</div>`:`<div class="modebar guess">🎯 GUESS ${esc(oppName.toUpperCase())}</div>`;
  const chip=self?'':`<div class="yourchip">🫵 You said: <b>${esc(answerText(q,DG.selfA[DG.idx]))}</b></div>`;
  const who=self?'Answer honestly about yourself:':`How did <b>${esc(oppName)}</b> answer this?`;
  screen.innerHTML=`${duelHeader()}${bar}
    <div class="qhead"><span class="pill l${q.lvl}">${meta.emoji} ${meta.name}</span></div>
    ${chip}<div class="who">${who}</div><div class="qtext">${esc(q.label)}</div>
    <div id="body">${inputHTML(q,self?'dgself':'dgguess')}</div>`;
}
function dgSelf(v){DG.selfA[DG.idx]=v;
  if(DG.mode==='interleaved'){DG.phase='guess';dgRender();}
  else if(DG.idx<ROUND_Q-1){DG.idx++;dgRender();}
  else dgSubmit();
}
function dgGuess(v){DG.guesses[DG.idx]=v;DG.fb={guess:v,actual:DG.targetSelf[DG.idx]};dgRender();}
function dgFbNext(){DG.fb=null;
  if(DG.idx<ROUND_Q-1){DG.idx++;DG.phase=DG.mode==='interleaved'?'self':'guess';dgRender();}
  else dgSubmit();
}
async function dgSubmit(){
  if(DG._sub)return;DG._sub=true;spin();
  const r=DG.round,patch={};
  if(DG.mode!=='guess_only')patch[myRole+'_self']=DG.selfA;
  if(DG.mode!=='self_only')patch[myRole+'_guesses']=DG.guesses;
  // Lock on the field that completes THIS turn → a re-submit is a no-op, so a resolved
  // round's winner can never be flipped and a turn can't be played twice.
  const lock=DG.mode==='self_only'?myRole+'_self':myRole+'_guesses';
  await sb.from('rounds').update(patch).eq('id',r.id).is(lock,null);
  if(DG.mode!=='guess_only'){const ups=r.question_ids.map((qid,i)=>({user_id:me.id,question_id:qid,answer:DG.selfA[i]}));await sb.from('self_answers').upsert(ups);ups.forEach(u=>me.answered&&me.answered.add(u.question_id));}
  const {data:fresh}=await sb.from('rounds').select('*').eq('id',r.id).maybeSingle();
  if(!fresh){toast('Could not save — try again');return openDuel(D.id);}
  if(roundStage(fresh).stage==='done'){await computeResolve(fresh);roundResult(fresh);}
  else duelWaiting(fresh);
}
async function computeResolve(r){
  let ac=0,bc=0;r.question_ids.forEach((qid,i)=>{ac+=scoreOne(QBYID[qid],r.a_guesses[i],r.b_self[i]);bc+=scoreOne(QBYID[qid],r.b_guesses[i],r.a_self[i]);});
  const winnerId=ac>bc?D.a:bc>ac?D.b:null;
  await sb.from('rounds').update({a_correct:ac,b_correct:bc,winner:winnerId}).eq('id',r.id);
  r.a_correct=ac;r.b_correct=bc;r.winner=winnerId;
  const {data:allR}=await sb.from('rounds').select('winner').eq('duel_id',D.id);
  let wa=0,wb=0;(allR||[]).forEach(x=>{if(x.winner===D.a)wa++;else if(x.winner===D.b)wb++;});
  let patch={wins_a:wa,wins_b:wb,updated_at:new Date().toISOString()};
  if(wa>=WIN_TARGET||wb>=WIN_TARGET){patch.status='finished';patch.winner=wa>wb?D.a:D.b;}
  await sb.from('duels').update(patch).eq('id',D.id);D={...D,...patch};
}
function roundRevealHtml(r){
  const myG=myRole==='a'?r.a_guesses:r.b_guesses,opG=myRole==='a'?r.b_guesses:r.a_guesses;
  const mySelf=myRole==='a'?r.a_self:r.b_self,opSelf=myRole==='a'?r.b_self:r.a_self;
  return r.question_ids.map((qid,i)=>{const q=QBYID[qid];
    const ic1=scoreOne(q,myG[i],opSelf[i])>=1?'🟢':scoreOne(q,myG[i],opSelf[i])>0?'🟡':'🔴';
    const ic2=scoreOne(q,opG[i],mySelf[i])>=1?'🟢':scoreOne(q,opG[i],mySelf[i])>0?'🟡':'🔴';
    return `<div class="ovrow"><div class="q">${esc(q.label)}</div>
      <div class="line"><span>${ic1} You: <b>${esc(answerText(q,myG[i]))}</b></span><span>${esc(oppName)} said <b>${esc(answerText(q,opSelf[i]))}</b></span></div>
      <div class="line" style="margin-top:4px"><span>${ic2} ${esc(oppName)} guessed <b>${esc(answerText(q,opG[i]))}</b></span><span>You said <b>${esc(answerText(q,mySelf[i]))}</b></span></div></div>`;}).join('');
}
function roundResult(r){
  const myC=myRole==='a'?r.a_correct:r.b_correct,opC=myRole==='a'?r.b_correct:r.a_correct;
  const iWon=r.winner===me.id,tie=!r.winner;$top.textContent=`Round ${r.round_no}`;
  const finished=D.status==='finished';
  screen.innerHTML=`<div class="center mt"><div class="big-emoji">${tie?'🤝':iWon?'🎉':'😬'}</div>
    <h2>${tie?'Round tied':iWon?'You win the round!':esc(oppName)+' wins the round'}</h2>
    <p class="sub">You ${myC} · ${esc(oppName)} ${opC}</p></div>${duelHeader()}
    <div class="section-t">This round</div>${roundRevealHtml(r)}
    <div class="footer-btn">${finished?`<button class="btn" onclick="duelResult()">See final result →</button>`:`<button class="btn" onclick="openDuel('${D.id}')">Continue →</button>`}</div>`;
}
function duelWaiting(r){
  $top.textContent=`Round ${r.round_no}`;
  screen.innerHTML=`<div class="mt2 center"><div class="big-emoji">⏳</div><h2>Your move is in!</h2>
    <p class="sub mt">Now it's <b style="color:var(--text)">${esc(oppName)}</b>'s turn for round ${r.round_no}. You'll see the result once they play.</p></div>
    ${duelHeader()}<div class="footer-btn"><button class="btn" onclick="goHome()">Back to my duels →</button></div>`;
}
async function createNextRound(){
  if(D.wins_a>=WIN_TARGET||D.wins_b>=WIN_TARGET)return null;
  const used=RND.flatMap(r=>r.question_ids);
  const pool=Q.map(q=>q.id).filter(id=>!used.includes(id));
  if(pool.length<ROUND_Q)return null;
  const roundNo=RND.length+1;
  const {data:exist}=await sb.from('rounds').select('*').eq('duel_id',D.id).eq('round_no',roundNo).maybeSingle();
  if(exist)return exist;
  const picked=shuffle(pool).slice(0,ROUND_Q).sort((x,y)=>QBYID[x].lvl-QBYID[y].lvl);
  const {data:nr,error}=await sb.from('rounds').insert({duel_id:D.id,round_no:roundNo,question_ids:picked}).select().single();
  if(error){const {data:ex2}=await sb.from('rounds').select('*').eq('duel_id',D.id).eq('round_no',roundNo).maybeSingle();return ex2||null;}
  return nr;
}
async function finishByWins(){const patch={status:'finished',winner:D.wins_a>D.wins_b?D.a:(D.wins_b>D.wins_a?D.b:null),updated_at:new Date().toISOString()};await sb.from('duels').update(patch).eq('id',D.id);D={...D,...patch};}
async function duelResult(){
  spin();const {data:rounds}=await sb.from('rounds').select('*').eq('duel_id',D.id).order('round_no');RND=rounds||[];
  const myW=myRole==='a'?D.wins_a:D.wins_b,opW=myRole==='a'?D.wins_b:D.wins_a,iWon=D.winner===me.id,tie=!D.winner;
  const {data:all}=await sb.from('duels').select('winner').or(`and(a.eq.${me.id},b.eq.${oppId}),and(a.eq.${oppId},b.eq.${me.id})`).eq('status','finished');
  let h2hMe=0,h2hOp=0;(all||[]).forEach(d=>{if(d.winner===me.id)h2hMe++;else if(d.winner===oppId)h2hOp++;});
  let ov='';RND.forEach(r=>{if(r.a_correct==null)return;ov+=roundRevealHtml(r);});
  $top.textContent='Result';
  screen.innerHTML=`<div class="center mt"><div class="big-emoji">${tie?'🤝':iWon?'🏆':'👑'}</div>
    <h2>${tie?'Draw!':iWon?'You win!':esc(oppName)+' wins'}</h2>
    <p class="sub">${myW}–${opW} vs ${esc(oppName)} · Head-to-head: ${h2hMe}–${h2hOp}</p></div>
    <div class="section-t">Every answer</div>${ov||'<p class="sub">—</p>'}
    <div class="footer-btn stack"><button class="btn" onclick="rematch()">Rematch ${esc(oppName)} →</button>
      <button class="btn ghost" onclick="goHome()">← My duels</button></div>`;
}
async function rematch(){const {data:ex}=await sb.from('duels').select('id').or(`and(a.eq.${me.id},b.eq.${oppId}),and(a.eq.${oppId},b.eq.${me.id})`).eq('status','active').maybeSingle();if(ex)return openDuel(ex.id);await createDuelWith({id:oppId,username:oppName});}

// ---------- LEADERBOARD ----------
async function leaderboard(){
  topRight();spin();
  const {data:duels}=await sb.from('duels').select('id,a,b,a_name,b_name').or(`a.eq.${me.id},b.eq.${me.id}`);
  const ids=(duels||[]).map(d=>d.id);const dById=Object.fromEntries((duels||[]).map(d=>[d.id,d]));
  const acc={};
  if(ids.length){const {data:rs}=await sb.from('rounds').select('*').in('duel_id',ids);
    (rs||[]).forEach(r=>{const d=dById[r.duel_id];if(!d)return;const meA=d.a===me.id,oid=meA?d.b:d.a,opName=meA?d.b_name:d.a_name;
      const opGuess=meA?r.b_guesses:r.a_guesses,mySelf=meA?r.a_self:r.b_self;
      if(!opGuess||!mySelf)return;acc[oid]=acc[oid]||{name:opName,c:0,t:0};
      r.question_ids.forEach((qid,i)=>{acc[oid].t++;acc[oid].c+=scoreOne(QBYID[qid],opGuess[i],mySelf[i]);});});}
  const rows=Object.values(acc).map(s=>[s.name,s.t?Math.round(s.c/s.t*100):0,s.t]).filter(r=>r[2]>0).sort((a,b)=>b[1]-a[1]);
  const body=rows.length?rows.map(([n,p],i)=>`<div class="lb-row ${i===0?'top':''}"><span class="lb-rank">${i===0?'👑':'#'+(i+1)}</span><span class="lb-name">${esc(n)}</span><span class="lb-pct">${p}%</span></div>`).join(''):'<p class="sub">No one has guessed you yet. Challenge a friend!</p>';
  screen.innerHTML=`<div class="mt center"><h2>Who knows me best</h2><p class="sub">Ranked by how well friends guess your answers.</p></div>
    <div class="mt">${body}</div><div class="footer-btn"><button class="btn ghost" onclick="goHome()">← Back</button></div>`;
}

// ---------- shared input ----------
function inputHTML(q,h){
  if(q.fmt==='binary')return `<div class="binary">${q.options.map((o,i)=>`<button class="opt" data-i="${i}" onclick="onPick('${h}',${i})">${esc(o)}</button>`).join('')}</div>`;
  if(q.fmt==='mc')return `<div class="options">${q.options.map((o,i)=>`<button class="opt" data-i="${i}" onclick="onPick('${h}',${i})">${esc(o)}</button>`).join('')}</div>`;
  return `<div class="slider-wrap"><div class="slider-labels"><span>${esc(q.poles[0])}</span><span>${esc(q.poles[1])}</span></div>
    <input type="range" min="0" max="100" value="50" id="sld"></div>
    <button class="btn mt" onclick="onSlider('${h}')">Continue →</button>`;
}
function onPick(h,i){if(h==='gpself')gpSelf(i);else if(h==='gpguess')gpGuess(i);else if(h==='dgself')dgSelf(i);else if(h==='dgguess')dgGuess(i);else if(h==='su')suAnswer(i);}
function onSlider(h){const v=+document.getElementById('sld').value;if(h==='gpself')gpSelf(v);else if(h==='gpguess')gpGuess(v);else if(h==='dgself')dgSelf(v);else if(h==='dgguess')dgGuess(v);else if(h==='su')suAnswer(v);}

init();
</script>
