  .hint{font-size:12px; color:var(--muted); text-align:center; margin-top:10px; line-height:1.5;}
  .err{color:var(--red); font-size:13px; text-align:center; min-height:16px; margin-top:8px;}
  .big-emoji{font-size:56px; text-align:center; margin-bottom:6px;}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);animation:rot 1s linear infinite;margin:40px auto;}
  @keyframes rot{to{transform:rotate(360deg)}}

  @media (max-width:430px){
    body{padding:0;}
    .phone{width:100%; height:100vh; height:100dvh; max-height:none; border-radius:0; box-shadow:none;}

</style>

      <button class="btn" id="authBtn">${signup?'Create account':'Log in'}</button>
      <button class="btn ghost" id="toggleBtn">${signup?'I already have an account':'Create a new account'}</button>
      <p class="hint">No email needed — just a username and password.</p>
    </div>`;
  document.getElementById('authBtn').onclick = signup?doSignup:doLogin;
  document.getElementById('toggleBtn').onclick=()=>{ authMode=signup?'login':'signup'; authScreen(); };
}
function setErr(m){ const e=document.getElementById('autherr'); if(e) e.textContent=m||''; }

// username-first: derive a stable, hidden email from the username (user never sees it)
async function emailForUsername(u){
  const norm=u.trim().toLowerCase();
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(norm));
  const hex=Array.from(new Uint8Array(buf)).slice(0,12).map(b=>b.toString(16).padStart(2,'0')).join('');
  return 'u'+hex+'@deepquizplayers.com';
}
async function doSignup(){
  const username=val('username'), password=val('password'); setErr('');
  if(!username||!password){ setErr('Pick a username and a password.'); return; }
  if(username.length<2){ setErr('Username is too short.'); return; }
  if(password.length<6){ setErr('Password must be at least 6 characters.'); return; }
  busy('authBtn',true);
  const { data:exists } = await sb.from('profiles').select('id').eq('username',username).maybeSingle();
  if(exists){ setErr('That username is taken — pick another.'); busy('authBtn',false); return; }
  const email=await emailForUsername(username);
  const { data, error } = await sb.auth.signUp({ email, password });
  if(error){ setErr(/already registered/i.test(error.message)?'That username is taken — pick another.':error.message); busy('authBtn',false); return; }
  if(!data.session){ setErr('Something went wrong — try logging in.'); authMode='login'; busy('authBtn',false); return; }
  const { error:pErr } = await sb.from('profiles').insert({ id:data.user.id, username });
  if(pErr){ setErr(pErr.code==='23505'?'That username is taken — pick another.':pErr.message); busy('authBtn',false); return; }
  me={ id:data.user.id, username };
  afterAuth();
}
async function doLogin(){
  const username=val('username'), password=val('password'); setErr('');
  if(!username||!password){ setErr('Enter your username and password.'); return; }
  busy('authBtn',true);
  const email=await emailForUsername(username);
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ setErr('Wrong username or password.'); busy('authBtn',false); return; }
  await loadMe(data.user);
  afterAuth();
}
async function doLogout(){ await sb.auth.signOut(); me=null; location.hash=''; route(); }
function afterAuth(){ topRight(); if(pendingAction==='create'){ pendingAction=null; cLevel(); return; } route(); }

function screenUsername(){
  topRight();
  screen.innerHTML=`
    <div class="mt2"><h2>Pick a username</h2><p class="sub mt" style="margin-bottom:16px">This is how friends see you.</p>
      <input class="field" id="username" maxlength="24" placeholder="Username" autocomplete="off"></div>
    <div class="err" id="autherr"></div>
    <div class="footer-btn"><button class="btn" id="uBtn">Save</button></div>`;
  document.getElementById('uBtn').onclick=async()=>{
    const u=val('username'); setErr(''); if(!u){ setErr('Enter a username.'); return; }
    busy('uBtn',true);
    const { data:ex } = await sb.from('profiles').select('id').eq('username',u).maybeSingle();
    if(ex){ setErr('Taken — try another.'); busy('uBtn',false); return; }
    const { error } = await sb.from('profiles').insert({ id:me.id, username:u });
    if(error){ setErr(error.message); busy('uBtn',false); return; }
    me={ id:me.id, username:u }; afterAuth();
  };
}

// ===================== HOME =====================
async function home(){
  topRight(); challengeBackTo=null;
  screen.innerHTML=`<div class="mt"><h2>Hi ${esc(me.username)} 👋</h2><p class="sub">Make a challenge and see who really knows you.</p></div>
    <div class="mt2" style="font-weight:700;font-size:14px;color:var(--muted)">Your challenges</div>
    <div id="mine" class="mt"><div class="spin"></div></div>
    <div class="footer-btn"><button class="btn" onclick="cLevel()">+ Create a challenge</button></div>`;
  const { data, error } = await sb.from('challenges').select('id,level,created_at').eq('creator_id',me.id).order('created_at',{ascending:false});
  const box=document.getElementById('mine');
  if(error){ box.innerHTML=`<p class="sub">Couldn't load: ${esc(error.message)}</p>`; return; }
  if(!data.length){ box.innerHTML=`<p class="sub">None yet — create your first one below.</p>`; return; }
  box.innerHTML = data.map(ch=>{
    const lvl=lvlMeta(ch.level);
    return `<div class="card-row"><span class="lvl-emoji">${lvl.emoji}</span>
      <div class="meta"><div class="t">${ch.id}</div><div class="s">up to ${lvl.name}</div></div>
      <button class="btn secondary mini" onclick="copyText(baseUrl()+'#c=${ch.id}')">Copy link</button>
      <button class="btn mini" onclick="showLeaderboard('${ch.id}')">Board</button></div>`;
  }).join('');
}

// ===================== CREATE =====================
let C={ level:3, deck:[], answers:[], idx:0 };
function cLevel(){
  topRight(); C={ level:3, deck:[], answers:[], idx:0 };
  screen.innerHTML=`<div class="mt"><h2>How deep do you dare?</h2>
    <p class="sub" style="margin-bottom:6px">Pick the deepest level. Each game escalates up to there.</p>
    <div class="levels" id="lv"></div></div>
    <div class="footer-btn"><button class="btn" onclick="cStart()">Start answering →</button></div>`;
  const lv=document.getElementById('lv');
  LEVELS.forEach(l=>{ const d=document.createElement('div');
    d.className='lvl-card'+(l.n<=C.level?' sel':'');
    d.onclick=()=>{ C.level=l.n; [...lv.children].forEach((c,i)=>c.classList.toggle('sel', i+1<=C.level)); };
    d.innerHTML=`<span class="lvl-emoji">${l.emoji}</span><div><div class="lvl-name">up to ${l.name}</div><div class="lvl-desc">${l.desc}</div></div>`;
    lv.appendChild(d); });
}
function cStart(){ C.deck=buildDeck(C.level); C.answers=[]; C.idx=0; cRender(); }
function cRender(){
  const q=QBYID[C.deck[C.idx]], meta=lvlMeta(q.lvl);
  $top.textContent=`About you · ${C.idx+1}/${C.deck.length}`;
  const prog=C.deck.map((_,i)=>`<span class="${i<C.idx?'done':i===C.idx?'cur':''}"></span>`).join('');
  screen.innerHTML=`<div class="prog">${prog}</div>
    <div class="qhead"><span class="pill l${q.lvl}">${meta.emoji} ${meta.name}</span></div>
    <div class="who">Your honest answer:</div><div class="qtext">${esc(q.label)}</div>
    <div id="body">${inputHTML(q,'cAnswer')}</div>`;
}
function cAnswer(i){ C.answers[C.idx]=i; cAdvance(); }
function cAnswerSlider(){ C.answers[C.idx]=+document.getElementById('sld').value; cAdvance(); }
function cAdvance(){ if(C.idx<C.deck.length-1){ C.idx++; cRender(); } else cSave(); }

async function cSave(){
  $top.textContent='Saving…';
  screen.innerHTML=`<div class="spin"></div>`;
  let code, tries=0, saved=false, lastErr=null;
  while(tries++<5 && !saved){
    code=shortCode();
    const { error } = await sb.from('challenges').insert({
      id:code, creator_id:me.id, creator_name:me.username, level:C.level,
      question_ids:C.deck, answers:C.answers });
    if(!error){ saved=true; break; }
    lastErr=error;
    if(error.code!=='23505') break; // not a duplicate code -> real error
  }
  if(!saved){ screen.innerHTML=`<div class="mt2 center"><h2>Couldn't save 😕</h2><p class="sub mt">${esc(lastErr?lastErr.message:'Unknown error')}</p></div>
    <div class="footer-btn"><button class="btn" onclick="cSave()">Try again</button><button class="btn ghost mt" onclick="home()">Home</button></div>`; return; }
  cShare(code);
}
function cShare(code){
  $top.textContent='Done 🎉';
  const link=baseUrl()+'#c='+code;
  const back=challengeBackTo; challengeBackTo=null;
  const heading = back ? `Now challenge ${esc(back)} back! 🔥` : 'Your challenge is live!';
  const sub = back ? `Send this straight to ${esc(back)} — let's see if they know you as well as you know them.`
                   : 'Share it with as many friends as you want. Everyone guesses on their own phone — and lands on your leaderboard.';
  const shareMsg = (back ? `I played your DeepQuiz — your turn now 👀 ` : `How well do you know me? Take my DeepQuiz 👀 `)+link;
  const shareTitle = back ? `Your turn 👀` : 'How well do you know me? 👀';
  screen.innerHTML=`<div class="center mt"><div class="big-emoji">${back?'🔥':'🎉'}</div><h2>${heading}</h2>
    <p class="sub mt">${sub}</p></div>
    <div class="mt" style="font-weight:700;font-size:14px;color:var(--muted)">Share link</div>
    <div class="linkbox mt" style="margin-top:8px">${esc(link)}</div>
    <div class="footer-btn stack">
      <button class="btn" id="shareBtn">${back?`Send to ${esc(back)}`:'Share with friends'}</button>
      <button class="btn secondary" onclick="copyText('${link}')">Copy link</button>
      <button class="btn ghost" onclick="showLeaderboard('${code}')">View leaderboard</button></div>`;
  document.getElementById('shareBtn').onclick=()=>{
    if(navigator.share) navigator.share({title:'DeepQuiz',text:shareTitle,url:link}).catch(()=>{}); else copyText(shareMsg); };
}

// ===================== PLAY (open a challenge) =====================
let G=null, GS={};
async function openChallenge(code){
  topRight();
  screen.innerHTML=`<div class="spin"></div>`;
  const { data, error } = await sb.from('challenges').select('*').eq('id',code).maybeSingle();
  if(error || !data){
    screen.innerHTML=`<div class="mt2 center"><div class="big-emoji">🔍</div><h2>Challenge not found</h2>
      <p class="sub mt">This link may be broken or removed.</p></div>
      <div class="footer-btn"><button class="btn" onclick="resetHome()">${me?'Home':'Go to DeepQuiz'}</button></div>`;
    return;
  }
  G=data; playIntro();
}
function playIntro(){
  const loggedIn=!!(me&&me.username);
  screen.innerHTML=`<div class="mt2 center"><div class="big-emoji">👀</div>
      <h2><span style="color:var(--accent)">${esc(G.creator_name)}</span> challenged you</h2>
      <p class="sub mt">How well do you actually know ${esc(G.creator_name)}? Guess their answers — no pressure 😏</p></div>
    ${loggedIn? `<p class="hint mt2">Playing as <b style="color:var(--text)">${esc(me.username)}</b></p>`
      : `<div class="mt2" style="font-weight:700;font-size:14px;color:var(--muted)">Your name</div>
         <input class="field" style="margin-top:8px" id="gn" maxlength="24" placeholder="e.g. Sam" autocomplete="off">
         <p class="hint">Want to keep your scores & challenge back? <a style="color:var(--accent);cursor:pointer" onclick="goAuthKeepHash()">Create an account</a></p>`}
    <div class="footer-btn"><button class="btn" onclick="playBegin()">Start guessing →</button></div>`;
  if(!loggedIn) setTimeout(()=>{ const e=document.getElementById('gn'); if(e) e.focus(); },50);
}
function goAuthKeepHash(){ authScreen(); } // hash stays; after login route() returns to challenge
function playBegin(){
  let name = (me&&me.username) ? me.username : val('gn');
  if(!name){ toast('Add your name first 🙂'); return; }
  GS={ idx:0, score:0, log:[], name };
  pRender();
}
function pRender(){
  const q=QBYID[G.question_ids[GS.idx]], meta=lvlMeta(q.lvl);
  $top.textContent=`Guessing · ${GS.idx+1}/${G.question_ids.length}`;
  const prog=G.question_ids.map((_,i)=>`<span class="${i<GS.idx?'done':i===GS.idx?'cur':''}"></span>`).join('');
  screen.innerHTML=`<div class="prog">${prog}</div>
    <div class="qhead"><span class="pill l${q.lvl}">${meta.emoji} ${meta.name}</span></div>
    <div class="who">What did <b>${esc(G.creator_name)}</b> answer?</div>
    <div class="qtext">${esc(q.label)}</div>
    <div id="body">${inputHTML(q,'pGuess')}</div><div id="reveal-slot"></div>`;
}
function pGuess(i){
  const q=QBYID[G.question_ids[GS.idx]], actual=G.answers[GS.idx];
  document.querySelectorAll('.opt').forEach(o=>o.style.pointerEvents='none');
  document.querySelectorAll('.opt').forEach(o=>{ const oi=+o.dataset.i;
    if(oi===actual){o.classList.add('correct'); o.innerHTML+=`<span class="tag">✓ ${esc(G.creator_name)}</span>`;}
    else if(oi===i){o.classList.add('wrong'); o.innerHTML+=`<span class="tag">✗ you</span>`;} });
  pReveal(i===actual?'correct':'wrong', answerText(q,i), answerText(q,actual), i===actual?1:0, '');
}
function pGuessSlider(){
  const q=QBYID[G.question_ids[GS.idx]], v=+document.getElementById('sld').value, actual=G.answers[GS.idx];
  const diff=Math.abs(v-actual), verdict=diff<=15?'correct':diff<=30?'close':'wrong', pts=diff<=15?1:diff<=30?0.5:0;
  document.getElementById('sld').disabled=true;
  document.getElementById('body').insertAdjacentHTML('beforeend',
    `<div class="marker"><div class="dot you" style="left:${v}%">You</div><div class="dot mia" style="left:${actual}%">${esc(G.creator_name)}</div></div>`);
  pReveal(verdict, answerText(q,v), answerText(q,actual), pts, `off by ${diff} of 100`);
}
function pReveal(verdict, yourTxt, actualTxt, pts, gap){
  GS.score+=pts; const q=QBYID[G.question_ids[GS.idx]]; GS.log.push({q,verdict});
  const vClass=verdict==='correct'?'v-correct':verdict==='close'?'v-close':'v-wrong';
  const vText=verdict==='correct'?'Nailed it! 🎯':verdict==='close'?'So close 👀':'Missed 🙈';
  const last=GS.idx===G.question_ids.length-1;
  const gapHtml=gap?`<span style="color:var(--muted);font-weight:600"> · ${gap}</span>`:'';
  document.getElementById('reveal-slot').innerHTML=`
    <div class="reveal"><div class="verdict ${vClass}">${vText}${gapHtml}</div>
      <div class="answer"><span class="you">You:</span> <b>${esc(yourTxt)}</b> &nbsp;·&nbsp; <span class="mia">${esc(G.creator_name)}:</span> <b>${esc(actualTxt)}</b></div></div>
    <div class="footer-btn"><button class="btn" onclick="pNext()">${last?'See my score →':'Next →'}</button></div>`;
  screen.scrollTo({top:screen.scrollHeight, behavior:'smooth'});
}
function pNext(){ if(GS.idx<G.question_ids.length-1){ GS.idx++; pRender(); } else pFinish(); }

async function pFinish(){
  const total=G.question_ids.length, pct=Math.round(GS.score/total*100);
  $top.textContent='Saving…'; screen.innerHTML=`<div class="spin"></div>`;
  await sb.from('plays').insert({ challenge_id:G.id, guesser_id:(me&&me.username)?me.id:null, guesser_name:GS.name, score:GS.score, total });
  pResult(pct,total);
}
function pResult(pct,total){
  $top.textContent='Result';
  const v=pct>=85?'You really get them 💫':pct>=60?'You know them well 💛':pct>=35?'Room to grow 🌱':'Strangers… for now 👀';
  const circ=2*Math.PI*72, off=circ*(1-pct/100);
  const recap=GS.log.map(a=>{const ic=a.verdict==='correct'?'🟢':a.verdict==='close'?'🟡':'🔴';
    return `<div class="recap-row"><span class="ic">${ic}</span><span class="qq">${esc(a.q.label)}</span></div>`;}).join('');
  screen.innerHTML=`<div class="center mt"><h2>How well you know ${esc(G.creator_name)}</h2></div>
    <div class="score-ring"><svg width="180" height="180">
      <circle cx="90" cy="90" r="72" stroke="rgba(255,255,255,.1)" stroke-width="13" fill="none"/>
      <circle cx="90" cy="90" r="72" stroke="url(#g)" stroke-width="13" fill="none" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" transform="rotate(-90 90 90)" id="ringArc"/>
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff6b9d"/><stop offset="1" stop-color="#ffd166"/></linearGradient></defs></svg>
      <div class="score-num"><div class="big">${pct}%</div><div class="small">${GS.score} / ${total} right</div></div></div>
    <div class="verdict-line">${v}</div>
    <div class="recap">${recap}</div>
    <div class="footer-btn stack">
      <button class="btn" onclick="startChallengeBack()">Challenge ${esc(G.creator_name)} back →</button>
      <button class="btn secondary" onclick="showLeaderboard('${G.id}')">See leaderboard</button>
      <button class="btn ghost" onclick="resetHome()">${me&&me.username?'Home':'Just make my own'}</button></div>`;
  requestAnimationFrame(()=>{ const a=document.getElementById('ringArc'); if(a){ a.style.transition='stroke-dashoffset 1s ease'; a.style.strokeDashoffset=off; }});
}
function startChallengeBack(){
  challengeBackTo = G ? G.creator_name : null;
  history.replaceState(null,'',location.pathname);   // drop #c= so reloads don't reopen the played challenge
  if(me && me.username){ cLevel(); }
  else { pendingAction='create'; authMode='signup'; authScreen(); }
}

// ===================== LEADERBOARD (from DB) =====================
async function showLeaderboard(code){
  topRight(); $top.textContent='Leaderboard'; screen.innerHTML=`<div class="spin"></div>`;
  const { data:ch } = await sb.from('challenges').select('creator_name,creator_id').eq('id',code).maybeSingle();
  const { data, error } = await sb.from('plays').select('guesser_name,score,total').eq('challenge_id',code).order('score',{ascending:false});
  if(error){ screen.innerHTML=`<p class="sub">Couldn't load: ${esc(error.message)}</p>`; return; }
  // keep best score per name
  const best={}; (data||[]).forEach(p=>{ const pct=Math.round(p.score/p.total*100); if(!(p.guesser_name in best)||pct>best[p.guesser_name]) best[p.guesser_name]=pct; });
  const rows=Object.entries(best).sort((a,b)=>b[1]-a[1]);
  const who = ch? ch.creator_name : 'this challenge';
  const isMine = me && ch && ch.creator_id===me.id;
  const body = rows.length ? rows.slice(0,20).map(([n,p],i)=>`<div class="lb-row ${i===0?'top':''}">
      <span class="lb-rank">${i===0?'👑':'#'+(i+1)}</span><span class="lb-name">${esc(n)}</span><span class="lb-pct">${p}%</span></div>`).join('')
    : `<p class="sub">No one has played yet. Share the link!</p>`;
  screen.innerHTML=`<div class="center mt"><h2>Who knows ${esc(who)} best</h2></div>
    <div class="lb mt">${body}</div>
    <div class="footer-btn stack">
      ${isMine?`<button class="btn" onclick="copyText(baseUrl()+'#c=${code}')">Copy challenge link</button>`:''}
      <button class="btn ${isMine?'secondary':''}" onclick="resetHome()">${me?'Home':'Create my own challenge →'}</button></div>`;
}

// ===================== shared input renderer =====================
function inputHTML(q, handler){
  if(q.fmt==='binary') return `<div class="binary">${q.options.map((o,i)=>`<button class="opt" data-i="${i}" onclick="${handler}(${i})">${esc(o)}</button>`).join('')}</div>`;
  if(q.fmt==='mc') return `<div class="options">${q.options.map((o,i)=>`<button class="opt" data-i="${i}" onclick="${handler}(${i})">${esc(o)}</button>`).join('')}</div>`;
  const sh = handler==='cAnswer' ? 'cAnswerSlider' : 'pGuessSlider';
  return `<div class="slider-wrap"><div class="slider-labels"><span>${esc(q.poles[0])}</span><span>${esc(q.poles[1])}</span></div>
    <input type="range" min="0" max="100" value="50" id="sld"></div>
    <button class="btn mt" onclick="${sh}()">${handler==='cAnswer'?'Next →':'Lock in guess'}</button>`;
}
function resetHome(){ location.hash=''; route(); }

init();
</script>
